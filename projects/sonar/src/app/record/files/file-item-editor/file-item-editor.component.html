<div class="ui:flex ui:flex-col ui:gap-2">
  <formly-form
    [model]="model"
    [fields]="fields"
    [options]="options"
    [form]="form"
  />
  <div class="ui:flex ui:justify-end ui:flex-wrap">
    <p-button
      [disabled]="form.invalid"
      [label]="'Save' | translate"
      (onClick)="save()"
      icon="fa fa-save"
      size="small"
    />
  </div>
</div>
