@if(store.deposit()) {
  <sonar-deposit-step [maxStep]="store.maxStep()" [steps]="steps()" />
  @if(currentStep() === 'diffusion') {
    <sonar-deposit-review [deposit]="store.deposit()!" />
  }

  <!--- form -->
  <p-tabs value="editor">
    <p-tablist>
      <p-tab value="editor">
        {{ 'Editor' | translate }}
      </p-tab>
      <p-tab value="json">
        {{ 'JSON' | translate }}
      </p-tab>
      @if(store.mainFile()) {
        <p-tab value="files">
          {{ 'Files' | translate }}
        </p-tab>
      }
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel value="editor">
        <sonar-deposit-editor
          [currentStep]="currentStep()"
          [steps]="steps()"
        />
      </p-tabpanel>
      <p-tabpanel value="json">
        <pre class="p-3" [innerHTML]="store.deposit() | json | highlightJson"></pre>
      </p-tabpanel>
      @if(store.mainFile()) {
        <p-tabpanel value="files">
          <sonar-deposit-files
            [mainFile]="store.mainFile()!"
            [depositPid]="store.deposit()!.pid"
            [additionalFiles]="store.additionalFiles()"
          />
        </p-tabpanel>
      }
    </p-tabpanels>
  </p-tabs>
}
