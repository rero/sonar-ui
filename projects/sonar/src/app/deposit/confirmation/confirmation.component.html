@if(deposit$ | async; as deposit) {
  <div class="ui:flex ui:flex-col ui:gap-3">
    <p-message
      [text]="'Thank you for submitting a publication!' | translate"
      severity="success"
      showTransitionOptions="0ms"
    />
    @if(deposit.status === 'to_validate') {
      <p-message
        [text]="'This deposit will be reviewed and published shortly.' | translate"
        severity="warn"
        showTransitionOptions="0ms"
      />
    }
    @if(deposit.status === 'validated') {
      <p-message
        [text]="'This deposit will be published shortly.' | translate"
        severity="danger"
        showTransitionOptions="0ms"
      />
    }
    @if(isSubmitter) {
      <div class="ui:flex ui:mt-4">
        <div class="ui:grow">
          <a [href]="publicInterfaceLink" translate>Back to public interface</a>
        </div>
        <a [routerLink]="['/deposit', 'create']" translate>Deposit another publication</a>
      </div>
    }
  </div>
}
