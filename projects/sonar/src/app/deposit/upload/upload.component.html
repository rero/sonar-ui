<sonar-deposit-step
  [maxStep]="maxStep()"
  [steps]="['files', 'metadata', 'contributors', 'projects', 'diffusion']"
/>
<div class="ui:flex ui:justify-end ui:flex-wrap">
  <p-button
    class="ui:flex ui:align-center ui:justify-center"
    [routerLink]="['..', 'metadata']"
    icon="fa fa-chevron-right"
    [label]="'Continue' | translate"
    iconPos="right"
  />
</div>

@if (deposit()) {
  <sonar-upload-files recordType="deposits" [pid]="deposit().pid"/>
}
