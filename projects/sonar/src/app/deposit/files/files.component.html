<h4 translate>Main file</h4>
{{ mainFile().key }} ({{ mainFile().size | filesize }})
<p-button
  href="#"
  icon="fa fa-eye"
  [text]="true"
  (onClick)="
    $event.preventDefault();
    previewFileKey.set(mainFile().key);
    isShowPreview.set(true)
  "
/>
<a
  [href]="mainFile().key | fileLink : 'deposits' : depositPid() : 'files'"
  pButton
  target="_blank"
  [text]="true"
><i class="fa fa-download"></i></a>

@if(additionalFiles()?.length > 0) {
  <div class="ui:mt-2">
    <h4 translate>Additional files</h4>
    @for(file of additionalFiles(); track file.key) {
      <div>
        {{ file.key }} ({{ file.size | filesize }})
        <p-button
          href="#"
          icon="fa fa-eye"
          [text]="true"
          (onClick)="previewFileKey.set(file.key); isShowPreview.set(true)"
        />
        <p-button
          [href]="file.key | fileLink : 'deposits' : depositPid() : 'files'"
          [text]="true"
          target="_blank"
          icon="fa fa-download"
        ></p-button>
      </div>
    }
  </div>
}

<!--Preview modal-->

<p-dialog
  [header]="previewFileKey()"
  [modal]="true"
  [(visible)]="isShowPreview"
  [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }"
  [style]="{ width: '50vw' }"
>
  <iframe
    [style]="{ width: '100%', height: '800px', border: 'none' }"
    [src]="previewFileKey() | fileLink : 'deposits' : depositPid() : 'preview'"
  ></iframe>
</p-dialog>
