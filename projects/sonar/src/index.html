<!DOCTYPE html>
<!-- public view html tag with data-view -->
<!-- <html lang="en" data-view="global"> -->
<!-- admin view html tag without data-view -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Swiss Open Access Repository</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      @layer theme, sonar-ui, primeng, utilities;
      :root {
        line-height: 1.5; /* 1 */
        -webkit-text-size-adjust: 100%; /* 2 */
        tab-size: 4; /* 3 */
        font-feature-settings: --theme(--default-font-feature-settings, normal); /* 5 */
        font-variation-settings: --theme(--default-font-variation-settings, normal); /* 6 */
        -webkit-tap-highlight-color: transparent; /* 7 */
        font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Helvetica, Arial, sans-serif;
        --font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI",
          Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 1rem;
      }
    </style>
    <style type="text/css" data-primeng-style-id="layer-order"></style>
  </head>

  <body>
    <sonar-root class="sonar-ui"></sonar-root>
  </body>
</html>
